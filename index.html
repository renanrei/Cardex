<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARDEX Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    /* Troque SUA_IMAGEM.jpg pela foto do Supra MK4 que você escolher */
    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
    url(https://i.pinimg.com/736x/6b/c0/de/6bc0de26a9d12162a73cb159c39e1dc7.jpg) center center/cover no-repeat fixed;
}

.logo{
    font-size:64px;
    font-weight:900;
    color:#00e5ff;
    letter-spacing:6px;
    text-shadow:
        0 0 8px #00e5ff,
        0 0 18px #00e5ff,
        0 0 35px #008cff,
        0 0 50px #008cff;
    margin-bottom:40px;
}

.icone-usuario{
    width:120px;
    height:120px;
    margin-bottom:35px;
    position:relative;
}

.circulo-externo{
    width:100%;
    height:100%;
    border:3px solid #00e5ff;
    border-radius:50%;
}

.icone-figura{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:70px;
    height:50px;
    border-radius:50px 50px 0 0;
    background:linear-gradient(#00e5ff,#0066ff);
    clip-path:polygon(0 0,100% 0,85% 100%,15% 100%);
}

input{
    width:300px;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
    background:rgba(255,255,255,.92);
}

.btn-entrar{
    width:300px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0066ff;
    color:#fff;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.btn-entrar:hover{
    background:#0099ff;
}

.link-conta{
    color:#fff;
    text-decoration:none;
    margin-top:20px;
}
</style>
</head>

<body>

<h1 class="logo">CARDEX</h1>

<div class="icone-usuario">
    <div class="circulo-externo"></div>
    <div class="icone-figura"></div>
</div>

<input type="email" placeholder="Email">

<input type="password" placeholder="Senha">

<button class="btn-entrar">Entrar</button>

<a href="#" class="link-conta">Ainda não possuo uma conta</a>

</body>
</html>
