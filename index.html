<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARDEX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body {
            min-height: 100vh;
            position: relative;
            color: #fff;
        }
        /* Fundo EXATO que pediu: Brian + Supra MK4 / Toretto + Charger RT */
        .fundo-cena {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('https://i.imgur.com/9XzGLwY.jpg') center/cover no-repeat fixed;
            z-index: 0;
        }
        .area-total {
            position: relative;
            z-index: 1;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
        }
        .logo {
            font-size: 56px;
            font-weight: 900;
            color: #ff6b00;
            letter-spacing: 1px;
        }
        .menu a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            margin-left: 28px;
            font-weight: 500;
        }
        .caixa-login {
            background: rgba(0,0,0,0.85);
            padding: 32px;
            border-radius: 12px;
            width: 350px;
            margin-left: auto;
        }
        .caixa-login h2 {
            text-align: center;
            margin-bottom: 22px;
            color: #ff6b00;
            font-size: 28px;
        }
        .caixa-login input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
        }
        .btn-principal {
            width: 100%;
            padding: 14px;
            background: #ff6b00;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 14px;
            cursor: pointer;
        }
        .btn-secundario {
            width: 100%;
            padding: 14px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="fundo-cena"></div>
    <div class="area-total">
        <div class="cabecalho">
            <div class="logo">CARDEX</div>
            <div class="menu">
                <a href="#">Início</a>
                <a href="#">Garagem</a>
                <a href="#">Coleção</a>
                <a href="#">Contato</a>
            </div>
        </div>

        <div class="caixa-login">
            <h2>Entrar</h2>
            <input type="email" placeholder="Seu e-mail">
            <input type="password" placeholder="Sua senha">
            <button class="btn-principal">Entrar</button>
            <button class="btn-secundario">Criar Conta</button>
        </div>
    </div>
</body>
</html>
