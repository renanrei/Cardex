<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarDex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#000;

color:white;

overflow-x:hidden;

}

header{

position:fixed;

top:0;

width:100%;

padding:20px 60px;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(0,0,0,.75);

backdrop-filter:blur(10px);

z-index:999;

}

.logo{

font-size:38px;

font-weight:bold;

color:#ff3b30;

letter-spacing:2px;

}

nav a{

color:white;

text-decoration:none;

margin-left:30px;

font-size:18px;

transition:.3s;

}

nav a:hover{

color:#ff3b30;

}

.hero{

height:100vh;

background:

linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),

url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80");

background-size:cover;

background-position:center;

display:flex;

align-items:center;

padding-left:8%;

}

.hero-text{

max-width:650px;

}

.hero h1{

font-size:70px;

color:#ffffff;

}

.hero span{

color:#ff3b30;

}

.hero p{

margin-top:20px;

font-size:22px;

color:#dddddd;

line-height:35px;

}

.botao{

display:inline-block;

margin-top:40px;

padding:18px 45px;

background:#ff3b30;

border-radius:50px;

text-decoration:none;

color:white;

font-weight:bold;

font-size:20px;

transition:.3s;

}

.botao:hover{

background:#ff5f55;

transform:scale(1.05);

}

</style>

</head>

<body>

<header>

<div class="logo">CARDEX</div>

<nav>

<a href="#">Início</a>

<a href="#">JDM</a>

<a href="#">Supercarros</a>

<a href="#">Clássicos</a>

<a href="#">Luxo</a>

</nav>

</header>

<section class="hero">

<div class="hero-text">

<h1>O universo dos <span>apaixonados por carros</span></h1>

<p>

Dos clássicos aos hipercarros.

Dos originais aos modificados.

Descubra máquinas lendárias como Supra MK4, Skyline GT-R R34, RX-7, Lancer Evolution e muito mais.

</p>

<a href="#" class="botao">Explorar Carros</a>

</div>

</section>

</body>

</html>
