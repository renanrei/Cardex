<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAR SHOW</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
display:flex;justify-content:center;align-items:center;
width:100vw;height:100vh;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.75)),
url('https://i.pinimg.com/736x/6b/c0/de/6bc0de26a9d12162a73cb159c39e1dc7.jpg') center/cover no-repeat fixed;
}
.box{background:rgba(0,0,0,.45);padding:40px;border-radius:18px;backdrop-filter:blur(6px);text-align:center}
.logo{color:#00e5ff;font-size:60px;font-weight:900;letter-spacing:5px;
text-shadow:0 0 8px #00e5ff,0 0 18px #00e5ff,0 0 35px #008cff;margin-bottom:30px}
input,button{width:320px;padding:14px;margin:10px 0;border:none;border-radius:10px;font-size:16px}
button{background:#008cff;color:#fff;font-weight:bold;cursor:pointer}
button:hover{background:#00aaff}
a{display:block;color:#fff;text-decoration:none;margin-top:20px}
</style>
</head>
<body>
<div class="box">
<h1 class="logo">CAR SHOW</h1>
<input type="email" placeholder="Email">
<input type="password" placeholder="Senha">
<button>Entrar</button>
<a href="#">Ainda não possuo uma conta</a>
</div>
</body>
</html>
