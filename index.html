<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarDex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
color:white;

background-image:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1800&q=80");

background-size:cover;
background-position:center;
background-attachment:fixed;

}

header{

padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.75);

}

.logo{

font-size:40px;
font-weight:bold;
color:#ff4d00;

}

nav a{

color:white;
text-decoration:none;
margin-left:25px;

}

.container{

display:flex;
justify-content:space-between;
align-items:center;

min-height:90vh;

padding:60px;

}

.texto{

width:55%;

}

.texto h1{

font-size:65px;
line-height:75px;

}

.texto p{

margin-top:25px;
font-size:22px;
color:#ddd;

}

.login{

width:360px;

background:rgba(20,20,20,.92);

padding:30px;

border-radius:20px;

}

.login h2{

text-align:center;
margin-bottom:20px;

}

input{

width:100%;

padding:15px;

margin-bottom:15px;

border:none;

border-radius:10px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:10px;

background:#ff4d00;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#ff6f2d;

}

.criar{

margin-top:15px;

background:#222;

}

</style>

</head>

<body>

<header>

<div class="logo">🚗 CARDEX</div>

<nav>

<a href="#">Início</a>

<a href="#">Coleção</a>

<a href="#">Garagem</a>

<a href="#">Contato</a>

</nav>

</header>

<div class="container">

<div class="texto">

<h1>Sua garagem<br>começa aqui.</h1>

<p>

Colecione carros lendários.

Descubra JDM, supercarros, clássicos,

muscle cars, modificados e muito mais.

</p>

</div>

<div class="login">

<h2>Entrar</h2>

<input type="email" placeholder="Seu e-mail">

<input type="password" placeholder="Sua senha">

<button>Entrar</button>

<button class="criar">Criar Conta</button>

</div>

</div>

</body>

</html>
