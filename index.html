<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARDEX - Velozes e Furiosos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }
        /* Fundo com a cena dos personagens */
        .fundo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://i.imgur.com/5Z7XQZL.jpg') center/cover no-repeat;
            z-index: 0;
        }
        .conteudo {
            position: relative;
            z-index: 1;
            padding: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
        }
        .logo {
            font-size: 52px;
            font-weight: 900;
            color: #ff6b00;
            letter-spacing: 2px;
        }
        .menu a {
            color: #fff;
            text-decoration: none;
            font-size: 19px;
            margin-left: 25px;
            font-weight: 500;
        }
        .meio {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 40px;
        }
        .texto {
            flex: 1;
            min-width: 300px;
        }
        .texto h1 {
            font-size: 72px;
            line-height: 1;
            margin-bottom: 25px;
        }
        .texto p {
            font-size: 22px;
            line-height: 1.5;
            color: #ddd;
        }
        .caixa-login {
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 10px;
            width: 340px;
        }
        .caixa-login h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ff6b00;
        }
        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
            font-size: 17px;
        }
        .btn-laranja {
            width: 100%;
            padding: 13px;
            background: #ff6b00;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .btn-preto {
            width: 100%;
            padding: 13px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 19px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="fundo"></div>
    <div class="conteudo">
        <div class="cabecalho">
            <div class="logo">CARDEX</div>
            <div class="menu">
                <a href="#">Início</a>
                <a href="#">Garagem</a>
                <a href="#">Coleção</a>
                <a href="#">Contato</a>
            </div>
        </div>

        <div class="meio">
            <div class="texto">
                <h1>Velozes<br>e Furiosos</h1>
                <p>
                    A família não acaba nunca.<br>
                    Colecione os carros lendários do filme:<br>
                    o Supra MK4 do Brian e o Charger RT do Toretto,<br>
                    e todos os outros ícones da velocidade.
                </p>
            </div>

            <div class="caixa-login">
                <h2>Entrar</h2>
                <input type="email" placeholder="Seu e-mail">
                <input type="password" placeholder="Sua senha">
                <button class="btn-laranja">Entrar</button>
                <button class="btn-preto">Criar Conta</button>
            </div>
        </div>
    </div>
</body>
</html>
