<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAR SHOW</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
    url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1600&q=80");

    background-size:cover;
    background-position:center;
}

.login{
    width:360px;
    padding:35px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,.4);
    text-align:center;
}

.logo{
    font-size:55px;
    font-weight:bold;
    color:#00E5FF;
    margin-bottom:30px;
    text-shadow:
    0 0 10px #00E5FF,
    0 0 20px #00E5FF,
    0 0 40px #008CFF;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0095FF;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#006DFF;
}

a{
    display:block;
    margin-top:20px;
    color:white;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="login">

<h1 class="logo">CAR SHOW</h1>

<input type="email" placeholder="Email">

<input type="password" placeholder="Senha">

<button>Entrar</button>

<a href="#">Ainda não possuo uma conta</a>

</div>

</body>
</html>
